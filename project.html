├─ api/
│  ├─ ingest/       # endpoint + file parsing + mode detection
│  ├─ forecast/     # forecast output endpoints
│  └─ ingredient-plan/ # advisories, planning
├─ core/
│  ├─ preprocessing/ # column mapping, dedupe, date parsing
│  ├─ forecasting/   # per store×item forecast logic
│  ├─ recipes/       # menu-item to ingredient expansion
│  └─ inventory/     # inventory simulation and advisories
├─ uploads/         # sample CSVs for tests
├─ schemas/         # CSV specs / field defs
└─ frontend/        # upload UI, dashboards
</pre>

      'flashfind': {
        title: 'FlashFind',
        role: 'Full-Stack / ML Developer',
  desc: 'Hyperlocal AI marketplace: users submit natural-language "Flash Requests" and the system parses intent with an LLM then Smart-Pings nearby students ranked by a Random Forest to fulfill needs in minutes.',

        <p>KinetiX is a revolutionary fleet management system developed by a team of three high school students from GEMS Modern Academy Dubai. It empowers logistical service providers to track and manage vehicles (buses, trucks) with real-time maintenance, vehicle history, registration, and operational data.</p>

      'text-to-sql': {
        title: 'Text-to-SQL LLM',

        desc: 'Built an AI-powered SQL chatbot that converts natural language questions into executable SQL and displays results in a Streamlit UI.',
        longDesc: `
        <p>Built an AI-powered SQL chatbot during my Jio internship that allows users to ask questions in natural language and automatically converts them into SQL queries. The system connects to a user-provided MySQL database, understands the database schema, generates the correct SQL query using an LLM, runs the query, and displays the result in a Streamlit web interface.</p>

        <p>Technically, I used Streamlit for the frontend, LangChain for LLM orchestration and prompt engineering, Ollama for local LLM integration, SQLDatabase for database connectivity, FAISS and OllamaEmbeddings for semantic similarity search, and Pandas for displaying query results as downloadable dataframes. The project also used structured output parsing to force the LLM response into a reliable SQL query format.</p>

        <p>I implemented two different query-generation pipelines: one optimized for faster runtime, and another optimized for higher accuracy. The faster version directly generates SQL using the user question, relevant database details, and example queries, while the more accurate version adds an extra LLM step to describe table data before generating the final SQL query.</p>

        <p><strong>Tech Stack:</strong> Python, Streamlit, LangChain, Ollama, SQL, MySQL, Pandas, FAISS, OllamaEmbeddings, Pygwalker, ChromaDB</p>

          <li>Generated table descriptions and examples automatically for better LLM context</li>
          <li>Used embeddings and FAISS similarity search to retrieve relevant examples</li>
          <li>Displayed query results in Streamlit as interactive, downloadable dataframes</li>
          <li>Compared two LLM pipelines based on speed vs. accuracy tradeoffs</li>

        resources: {

        extras: 'ML · Internship'
      },
      'ai-nlp-predictive-models': {
        title: 'AI / NLP Predictive Models',
        role: 'AI & NLP Intern · NUS',
        desc: 'AI / NLP projects: predictive analytics, chatbots, face recognition, and telecom churn prediction.',
        longDesc: `
        <h3>Technical Contributions</h3>
        <ul>
          <li>Implemented ANN, CNN, RNN, regression, clustering, and decision tree models.</li>
          <li>Built and deployed chatbots using Amazon Lex.</li>
          <li>Built face recognition solutions using Amazon Rekognition.</li>
        </ul>

        <h3>Telecom Customer Churn Prediction Project</h3>
        <p>Built a machine learning project to analyze telecom customer behavior and predict customer churn using Python. The project cleaned and transformed a dataset of over 7,000 customers, explored churn patterns through visualizations, and compared multiple classification models to identify which factors were most strongly linked to customers leaving.</p>

        <p>Technically, I used Pandas and NumPy for data cleaning and preprocessing, converted categorical customer attributes into model-ready features with one-hot encoding, and used Matplotlib and Seaborn to visualize relationships between churn, tenure, contract type, monthly charges, and customer demographics. I then trained and evaluated several models, including Logistic Regression, Random Forest, Support Vector Machine, and an LSTM neural network, with the best model reaching around 82% accuracy.</p>

      'sabra-lab-cv-research': {
        title: 'Autonomous BlueBoat Navigation Research',
        role: 'Undergraduate Researcher · Georgia Tech',
        desc: 'Research on perception and autonomous navigation for a BlueBoat surface vessel using computer vision, depth estimation, object detection, and sensor fusion.',
        longDesc: `
        <p>I am working on research focused on building an autonomous navigation and perception system for a BlueBoat surface vessel. The project explores how computer vision, depth estimation, object detection, and sensor fusion can help the boat better understand its environment and navigate safely on water.</p>

        <p>My work focuses mainly on the perception side of the system. I have tested and compared different monocular depth estimation models, including Apple Depth Pro, MiDaS, ZoeDepth, and ORB-SLAM-based approaches, to evaluate how well they estimate distance from a single camera feed. A key part of this research is determining which models are accurate enough for navigation while still being lightweight enough to run on a Raspberry Pi 5 onboard the boat.</p>

        <p>I am also contributing to the broader navigation pipeline through YOLOv10-based object detection research, sonar-based position estimation using an Extended Kalman Filter, and high-level navigation logic for autonomous movement. Together, these components help the boat detect obstacles, estimate distance, track its position, and make safer navigation decisions.</p>

        `,

      function qs(key) {
        return new URLSearchParams(window.location.search).get(key);
      }

      const id = qs('id');
      const project = PROJECTS[id];

      console.log('project page debug → id=', id, 'foundProject=', !!project);

      if (!project) {
        // friendly fallback when opened without an id or unknown id
        document.getElementById('pTitle').textContent = 'No project selected';
        document.getElementById('pDesc').textContent = 'Open a project from the portfolio (index.html) or use a URL like project.html?id=sidequest.';
        document.getElementById('pResources').innerHTML = `<a href="index.html">← Back to portfolio</a>`;
        return;
      } else {
        const titleEl = document.getElementById('pTitle');
        if (project.resources && project.resources.website) {
          titleEl.innerHTML = `<a href="${project.resources.website}" target="_blank">${project.title}</a>`;
        } else {
          titleEl.textContent = project.title;
        }
        document.getElementById('pRole').textContent = project.role;
        document.getElementById('pDesc').textContent = project.desc;
  // continue with default rendering
      // long description
      if (project.longDesc) document.getElementById('pLongDesc').innerHTML = project.longDesc;

      // contributions
      const contribList = document.getElementById('pContribs');
      if (project.contributions && project.contributions.length) {
        project.contributions.forEach(c => {
          const li = document.createElement('li'); li.textContent = c; contribList.appendChild(li);
        });
      } else {
        // hide contributions heading and list if none
        const h = document.getElementById('contribHeading'); if (h) h.style.display = 'none';
        if (contribList) contribList.style.display = 'none';
      }

      // for BirthdayPal, embed the YouTube video directly below contributions
      if (id === 'birthdaypal' && project.resources && project.resources.youtube) {
        // try to extract video id
        const url = project.resources.youtube;
        const m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{10,})/);
        const vid = m ? m[1] : null;
        const container = document.createElement('div');
        container.className = 'embedded-video';
        if (vid) {
          container.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}?rel=0" title="BirthdayPal demo" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else {
          container.innerHTML = `<a class="btn" href="${url}" target="_blank">Open video on YouTube</a>`;
        }
        // insert after contributions list
        contribList.parentNode.insertBefore(container, contribList.nextSibling);
      }

  // (no custom renderers)

      // officers
      const off = document.getElementById('pOfficers');
      if (project.officers) {
        const parts = [];
        if (project.officers.technicalLeaders) parts.push('<strong>Technical Leaders:</strong> ' + project.officers.technicalLeaders.join(', '));
        if (project.officers.seniorDevelopers) parts.push('<strong>Senior Developers:</strong> ' + project.officers.seniorDevelopers.join(', '));
        if (project.officers.seniorDesigner) parts.push('<strong>Senior Designer:</strong> ' + project.officers.seniorDesigner);
        off.innerHTML = parts.join('<br>');
      } else {
        const h = document.getElementById('officersHeading'); if (h) h.style.display = 'none';
        if (off) off.style.display = 'none';
      }

      // app structure
      if (project.appStructure) {
        document.getElementById('pAppStructure').innerHTML = project.appStructure;
      } else {
        const h = document.getElementById('structureHeading'); if (h) h.style.display = 'none';
        const s = document.getElementById('pAppStructure'); if (s) s.style.display = 'none';
      }

      // render an inline image if provided in resources (e.g., image.png)
      if (project.resources && project.resources.image) {

        const img = document.createElement('img');

        img.alt = project.title + ' — image';
        img.style.maxWidth = '100%';
        img.style.borderRadius = '8px';
        img.style.marginTop = '12px';
        // place after appStructure
        const s = document.getElementById('pAppStructure');
        if (s && s.parentNode) s.parentNode.insertBefore(img, s.nextSibling);

      if (project.architecture) document.getElementById('pArchitecture').innerHTML = project.architecture;

      if (project.viewModels) {

        if (vmEl) vmEl.innerHTML = project.viewModels;
      }

      // git workflow
      if (project.gitWorkflow) document.getElementById('pGitWorkflow').innerHTML = project.gitWorkflow;
      if (project.workflowSummary) document.getElementById('pWorkflowSummary').textContent = project.workflowSummary;

      const tags = document.getElementById('pTags');
      if (project.tags) project.tags.forEach(t => { const s = document.createElement('span'); s.className = 'tag'; s.textContent = t; tags.appendChild(s); });

      document.getElementById('pExtras').textContent = project.extras || '';

      // resources and stats
      if (project.resources) {
        const r = document.getElementById('pResources');
        // prefer a small set of styled buttons/links; make demo link larger/prominent
  const website = project.resources.website ? `<a class="btn" href="${project.resources.website}" target="_blank">Website</a>` : '';
  const github = project.resources.github ? `<a class="btn" href="${project.resources.github}" target="_blank">GitHub</a>` : '';
  // for birthdaypal we'll embed the video inline (no header button), otherwise link out
  const youtube = project.resources.youtube ? (id === 'birthdaypal' ? '' : `<a class="btn" href="${project.resources.youtube}" target="_blank">YouTube</a>`) : '';
  const notebook = project.resources.notebook ? `<a id="notebookLink" class="btn" href="${project.resources.notebook}" target="_blank">Notebook</a>` : '';
  const pdfBtn = project.resources && project.resources.pdf ? `<a id="pdfLink" class="btn" href="${project.resources.pdf}" target="_blank">View PDF</a>` : '';
  // make the watch/demo button slightly smaller for tastecast and even smaller for sidequest
  let demoClass = 'btn btn-large';
  if (id === 'tastecast') demoClass = 'btn btn-medium';
  if (id === 'sidequest') demoClass = 'btn btn-small';
  const demo = project.resources.demoVideo ? `<a class="${demoClass}" href="${project.resources.demoVideo}" target="_blank">▶ Watch demo</a>` : '';
  const devpostBtn = project.resources.devpost ? (id === 'flashfind' ? `<a class="btn" href="${project.resources.devpost}" target="_blank">Open Devpost</a>` : `<button id="openDevpostEmbed" class="btn">Open Devpost</button>`) : '';
        const misc = [];
        if (project.resources.readme) misc.push('<strong>Readme</strong>');
        if (project.resources.activity) misc.push('<strong>Activity</strong>');
        if (project.resources.customProperties) misc.push('<strong>Custom properties</strong>');
        const miscHtml = misc.length ? `<div style="margin-top:0.5rem">${misc.join(' · ')}</div>` : '';

        // insert resource buttons next to the title instead of at the bottom
        const resourcesRow = document.createElement('div');
  // for tastecast, add wider spacing between links
  resourcesRow.className = id === 'tastecast' ? 'header-resources header-resources--wide' : 'header-resources';
  // order: website, github, notebook, youtube, demo, devpost
  resourcesRow.innerHTML = `${website}${github}${notebook}${pdfBtn}${youtube}${demo}${devpostBtn}`;
        const titleEl = document.getElementById('pTitle');
        if (titleEl && titleEl.parentNode) {
          titleEl.parentNode.insertBefore(resourcesRow, titleEl.nextSibling);
        }
        // clear the bottom resources container to avoid duplication; show misc info there if present
        r.innerHTML = miscHtml || '';

  // If a notebook is provided and it's an HTML export, embed it inline below the long description.
  if (project.resources.notebook && project.resources.notebook.match(/\.html?$/i)) {
          // create a responsive iframe container
          const nbContainer = document.createElement('div');
          nbContainer.style.marginTop = '12px';
          nbContainer.style.background = '#0f0f11';
          nbContainer.style.padding = '8px';
          nbContainer.style.borderRadius = '8px';
          nbContainer.innerHTML = `<iframe src="${project.resources.notebook}" style="width:100%;height:70vh;border:0;border-radius:6px"></iframe>`;
          // insert after the long description container if present, otherwise after the resources row
          const longDescEl = document.getElementById('pLongDesc');
          if (longDescEl && longDescEl.parentNode) {
            longDescEl.parentNode.insertBefore(nbContainer, longDescEl.nextSibling);
          } else if (resourcesRow && resourcesRow.parentNode) {
            resourcesRow.parentNode.insertBefore(nbContainer, resourcesRow.nextSibling);
          }
          // update notebook link to open in a new tab (keeps behavior) but label it 'Open notebook (new tab)'
          const nl = document.getElementById('notebookLink');
          if (nl) nl.textContent = 'Open notebook (new tab)';
        }
        // If a PDF resource is provided, embed it inline below the long description as an iframe.
        if (project.resources.pdf && project.resources.pdf.match(/\.pdf$/i)) {
          const pdfContainer = document.createElement('div');
          pdfContainer.style.marginTop = '12px';
          pdfContainer.style.background = '#0f0f11';
          pdfContainer.style.padding = '8px';
          pdfContainer.style.borderRadius = '8px';
          pdfContainer.innerHTML = `<iframe src="${project.resources.pdf}" style="width:100%;height:70vh;border:0;border-radius:6px"></iframe>`;
          const longDescEl2 = document.getElementById('pLongDesc');
          if (longDescEl2 && longDescEl2.parentNode) {
            longDescEl2.parentNode.insertBefore(pdfContainer, longDescEl2.nextSibling);
          } else if (resourcesRow && resourcesRow.parentNode) {
            resourcesRow.parentNode.insertBefore(pdfContainer, resourcesRow.nextSibling);
          }
          const pl = document.getElementById('pdfLink'); if (pl) pl.textContent = 'Open PDF (new tab)';
        }

  // if devpost is present and not flashfind, wire up modal logic
  if (project.resources.devpost && id !== 'flashfind') {
          // attach click handler after next tick
          setTimeout(() => {
            const btn = document.getElementById('openDevpostEmbed');
            if (!btn) return;
            btn.addEventListener('click', () => {
              const modal = document.getElementById('devpostModal');
              const iframe = document.getElementById('devpostFrame');
              const fallback = document.getElementById('devpostFallback');
              const link = document.getElementById('devpostLink');
              const url = project.resources.devpost;
              iframe.src = url;
              link.href = url;
              modal.style.display = 'flex';
              fallback.style.display = 'none';
              let loaded = false;
              iframe.onload = () => { loaded = true; fallback.style.display = 'none'; };
              iframe.onerror = () => { loaded = false; fallback.style.display = 'block'; };
              setTimeout(() => { if (!loaded) fallback.style.display = 'block'; }, 2000);
            });
          }, 0);
        }
          // if youtube is present and project is birthdaypal, wire up youtube modal
          if (project.resources.youtube && id === 'birthdaypal') {
            setTimeout(() => {
              const ybtn = document.getElementById('openYoutubeEmbed');
              if (!ybtn) return;
              ybtn.addEventListener('click', () => {
                const modal = document.getElementById('youtubeModal');
                const iframe = document.getElementById('youtubeFrame');
                const fallback = document.getElementById('youtubeFallback');
                const link = document.getElementById('youtubeLink');
                const url = project.resources.youtube;
                // attempt to extract video id for embed
                const m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{10,})/);
                const vid = m ? m[1] : null;
                iframe.src = vid ? `https://www.youtube.com/embed/${vid}?rel=0` : url;
                link.href = url;
                modal.style.display = 'flex';
                fallback.style.display = 'none';
                let loaded = false;
                iframe.onload = () => { loaded = true; fallback.style.display = 'none'; };
                iframe.onerror = () => { loaded = false; fallback.style.display = 'block'; };
                setTimeout(() => { if (!loaded) fallback.style.display = 'block'; }, 1500);
              });
            }, 0);
          }
      }
      if (project.stats) {
        document.getElementById('pStats').textContent = `Stars: ${project.stats.stars} · Watchers: ${project.stats.watchers} · Forks: ${project.stats.forks}`;
      }
    }
  });
  // Devpost modal markup and handlers
  const modalHtml = `
  <div id="devpostModal" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:9999">
    <div style="width:90%;max-width:1000px;background:#0f0f11;padding:12px;border-radius:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <strong style="color:#f0ede8">Devpost preview</strong>
        <button id="closeDevpost" class="btn">Close</button>
      </div>
      <iframe id="devpostFrame" src="about:blank" style="width:100%;height:65vh;border:0;border-radius:8px"></iframe>
      <div id="devpostFallback" style="display:none;margin-top:8px;color:#cfcac0">
        Could not embed Devpost (likely blocked). <a id="devpostLink" href="#" target="_blank">Open on Devpost</a>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  document.getElementById('closeDevpost').addEventListener('click', () => {
    const modal = document.getElementById('devpostModal');
    const iframe = document.getElementById('devpostFrame');
    modal.style.display = 'none';
    iframe.src = 'about:blank';
  });
  // YouTube modal for BirthdayPal
  const ytModal = `
  <div id="youtubeModal" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:10000">
    <div style="width:90%;max-width:900px;background:#0f0f11;padding:12px;border-radius:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <strong style="color:#f0ede8">Video</strong>
        <button id="closeYoutube" class="btn">Close</button>
      </div>
      <iframe id="youtubeFrame" src="about:blank" style="width:100%;height:56vh;border:0;border-radius:8px"></iframe>
      <div id="youtubeFallback" style="display:none;margin-top:8px;color:#cfcac0">
        Could not load embed. <a id="youtubeLink" href="#" target="_blank">Open on YouTube</a>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', ytModal);
  document.getElementById('closeYoutube').addEventListener('click', () => {
    const modal = document.getElementById('youtubeModal');
    const iframe = document.getElementById('youtubeFrame');
    modal.style.display = 'none';
    iframe.src = 'about:blank';
  });
  </script>
</body>
</html>
